# Publish Java client SDK modules to Maven Central with GPG-signed artifacts.
# Required org-level secrets (provisioned by FOSS team after repo whitelisting):
#   MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_TOKEN, FOSS_GPG_KEY, FOSS_GPG_PASSPHRASE

name: Publish Clients to Maven Central

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
      GPG_PASSPHRASE: ${{ secrets.FOSS_GPG_PASSPHRASE }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          settings-path: ${{ github.workspace }}

      - name: Set up GPG for signing
        run: |
          echo "${{ secrets.FOSS_GPG_KEY }}" | gpg --batch --yes --pinentry-mode loopback --import
          gpg --list-secret-keys --keyid-format=long

      - name: Build and deploy to Maven Central 
        run: ./mvnw -B -Prelease -f clients/java/pom.xml clean deploy -s $GITHUB_WORKSPACE/settings.xml
        env:
          GPG_PASSPHRASE: ${{ secrets.FOSS_GPG_PASSPHRASE }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.FOSS_GPG_PASSPHRASE }}
